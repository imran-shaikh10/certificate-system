<script>

function generateCertificate(){

  var name = document.getElementById("name").value;
  var course = document.getElementById("course").value;

  if(!name){
    alert("Enter your name");
    return;
  }

  var certID = "CTX" + Math.floor(Math.random()*1000000);

  // Sheet save (safe)
  fetch("https://script.google.com/macros/s/AKfycbwxIQqZXu-aMbcsniNKg1FAJTWAFVmUmUWapk7HfmrRUzoB4v3R96T0_jRfSfUzQVf0/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      course: course,
      certID: certID
    })
  }).catch(() => console.log("Sheet error ignored"));

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");

  var certImages = {
    "Advance Excel": "excel.png",
    "SQL Server": "sql.png",
    "Power BI": "powerbi.png",
    "Python": "python.png"
  };

  var img = new Image();
  img.src = certImages[course];

  // 🔥 IMPORTANT FIX
  img.onerror = function(){
    alert("Image not found! Check file names in GitHub.");
  };

  img.onload = function(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    ctx.font = "60px Arial";
    ctx.fillStyle = "#0b3d2e";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width/2, 600);

    var today = new Date().toLocaleDateString();
    ctx.font = "18px Arial";
    ctx.fillText("Issued: " + today, 1100, 820);

    ctx.fillText("ID: " + certID, 200, 820);

    var verifyURL = "https://imran-shaikh10.github.io/certificate-system/verify.html?id=" + certID;

    var qr = new Image();
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(verifyURL);

    qr.onload = function(){

      ctx.drawImage(qr, 1080, 640, 120, 120);

      var link = document.createElement("a");
      link.download = name + "_certificate.png";
      link.href = canvas.toDataURL();
      link.click();
    };

  };

}

</script>
