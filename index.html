<script>

window.onload = function(){

  const params = new URLSearchParams(window.location.search);
  const certID = params.get("id");

  if(!certID){
    document.getElementById("result").innerHTML = "<span style='color:red;'>❌ No Certificate ID</span>";
    return;
  }

  verify(certID);
}

function verify(certID){

  fetch("https://script.google.com/macros/s/AKfycbwxIQqZXu-aMbcsniNKg1FAJTWAFVmUmUWapk7HfmrRUzoB4v3R96T0_jRfSfUzQVf0/exec")
    .then(res => res.json())
    .then(data => {

      let found = false;

      for(let i = 1; i < data.length; i++){

        let name = data[i][0];
        let course = data[i][1];
        let id = data[i][2];

        if(id === certID){

          found = true;

          document.getElementById("result").innerHTML = `
            <h2 style="color:green;">🎉 Verified!</h2>
            <p><b>${name}</b>, you are a certified student of <b>CognitiaX AI</b></p>
            <p>Congratulations! Your certificate has been successfully claimed ✅</p>
            <p style="margin-top:10px;">Redirecting to official website...</p>
          `;

          // 🔥 AUTO REDIRECT AFTER 3 SEC
          setTimeout(function(){
            window.location.href = "https://cognitiaxai.in";
          }, 3000);

          break;
        }
      }

      if(!found){
        document.getElementById("result").innerHTML = `
          <h2 style="color:red;">❌ Invalid Certificate</h2>
        `;
      }

    })
    .catch(err => {
      document.getElementById("result").innerHTML = "⚠️ Server Error";
    });

}

</script>
