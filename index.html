<!DOCTYPE html>
<html>
<head>
  <title>Certificate Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Allura&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 420px;
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0b3d2e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    canvas {
      margin-top: 15px;
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🎓 Generate Certificate</h2>

  <input type="text" id="name" placeholder="Enter your name">

  <select id="course">
    <option value="Advance Excel">Advance Excel</option>
    <option value="SQL Server">SQL Server</option>
    <option value="Power BI">Power BI</option>
    <option value="Python">Python</option>
  </select>

  <button onclick="generateCertificate()">Download Certificate</button>

  <canvas id="canvas" width="1400" height="1000"></canvas>

</div>

<script>

function generateCertificate(){

  var name = document.getElementById("name").value;
  var course = document.getElementById("course").value;

  if(!name){
    alert("Enter your name");
    return;
  }

  var certID = "CTX" + Math.floor(Math.random()*1000000);

  // Google Sheet save
  fetch("https://script.google.com/macros/s/AKfycbwxIQqZXu-aMbcsniNKg1FAJTWAFVmUmUWapk7HfmrRUzoB4v3R96T0_jRfSfUzQVf0/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      course: course,
      certID: certID
    })
  });

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");

  var img = new Image();

  var certImages = {
    "Advance Excel": "excel.png",
    "SQL Server": "sql.png",
    "Power BI": "powerbi.png",
    "Python": "python.png"
  };

  img.src = certImages[course];

  img.onload = function(){

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    // Name
    ctx.font = "60px 'Allura'";
    ctx.fillStyle = "#0b3d2e";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width/2, 600);

    // Date
    var today = new Date().toLocaleDateString();
    ctx.font = "18px Arial";
    ctx.fillText("Issued: " + today, 1100, 820);

    // ID
    ctx.font = "16px Arial";
    ctx.fillText("ID: " + certID, 200, 820);

    // QR Code
    var verifyURL = "https://imran-shaikh10.github.io/certificate-system/verify.html?id=" + certID;

    var qr = new Image();
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(verifyURL);

    qr.onload = function(){

      ctx.drawImage(qr, 1080, 640, 120, 120);

      ctx.font = "12px Arial";
      ctx.fillText("Scan to Verify", 1080, 780);

      // Download
      var link = document.createElement("a");
      link.download = name + "_certificate.png";
      link.href = canvas.toDataURL();
      link.click();
    };
  };

}

</script>

</body>
</html>
