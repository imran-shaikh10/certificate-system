<script>

function generateCertificate() {

  var name = document.getElementById("name").value;
  var course = document.getElementById("course").value;

  if(name === ""){
    alert("Enter your name");
    return;
  }

  var certID = "CTX" + Math.floor(Math.random()*1000000);

  // ✅ SEND DATA TO GOOGLE SHEET
  fetch("https://script.google.com/macros/s/AKfycbwxIQqZXu-aMbcsniNKg1FAJTWAFVmUmUWapk7HfmrRUzoB4v3R96T0_jRfSfUzQVf0/exec", {
    method: "POST",
    body: JSON.stringify({
      name: name,
      course: course,
      certID: certID
    })
  });

  var canvas = document.getElementById("canvas");
  var ctx = canvas.getContext("2d");

  var img = new Image();

  var certImages = {
    "Advance Excel": "excel.png",
    "SQL Server": "sql.png",
    "Power BI": "powerbi.png",
    "Python": "python.png"
  };

  img.src = certImages[course];

  img.onload = function(){

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // NAME
    ctx.font = "70px 'Allura'";
    ctx.fillStyle = "#0b3d2e";
    ctx.textAlign = "center";
    ctx.fillText(name, canvas.width/2, 600);

    // DATE
    var today = new Date().toLocaleDateString();
    ctx.font = "bold 20px Arial";
    ctx.fillText("Issued: " + today, 1100, 820);

    // CERTIFICATE ID
    ctx.font = "bold 18px Arial";
    ctx.fillText("ID: " + certID, 200, 820);

    // 🔥 QR CODE FIX (IMPORTANT)
    var verifyURL = "https://imran-shaikh10.github.io/certificate-system/verify.html?id=" + certID;

    var qr = new Image();

    // ✅ FIX 1: encodeURIComponent (very important)
    qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(verifyURL);

    qr.onload = function(){

      // QR Position
      ctx.drawImage(qr, 1080, 640, 130, 130);

      // Border
      ctx.strokeRect(1080, 640, 130, 130);

      // Text
      ctx.font = "14px Arial";
      ctx.fillStyle = "#000";
      ctx.fillText("Scan to Verify", 1080, 790);

      // DOWNLOAD AFTER EVERYTHING LOADS
      var link = document.createElement('a');
      link.download = name + "_certificate.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

  }
}

</script>
